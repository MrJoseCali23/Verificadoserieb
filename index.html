<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador BCB - Serie B Inhabilitada</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Validador de Emergencia</h1>
        </div>
        <p class="subtitulo">Billetes Serie B - Comunicado CP9/2026</p>
    </header>

    <main>
        <!-- Contador -->
        <div id="contador">
            <div class="cnt valido-cnt">✅ <span id="cnt-validos">0</span> Válidos</div>
            <div class="cnt peligro-cnt">❌ <span id="cnt-invalidos">0</span> Inválidos</div>
        </div>

        <div id="reader-wrapper">
            <video id="reader" autoplay playsinline muted></video>
            <canvas id="canvas" style="display:none"></canvas>
            <div class="camera-guide"></div>
            <div id="procesando" class="oculto">⏳ Procesando...</div>
        </div>

        <div id="resultado-container">
            <div id="resultado-cuadro">
                <div id="icono-estado">🔍</div>
                <span id="mensaje-estado">Listo para escanear</span>
            </div>
            <p class="nota-ayuda">Apunta al número del billete y presiona CAPTURAR.</p>
        </div>

        <div class="acciones">
            <button id="boton-escanear">ENCENDER CÁMARA</button>
            <button id="boton-capturar" disabled>📷 CAPTURAR</button>
            <button id="boton-linterna" disabled>🔦 LINTERNA</button>
            <button id="boton-apagar" disabled>APAGAR CÁMARA</button>
            <button id="boton-manual" onclick="verificarManual()">Ingreso Manual</button>
        </div>

        <!-- Historial -->
        <div id="historial-container">
            <h3>Historial de escaneos</h3>
            <button id="boton-limpiar" onclick="limpiarHistorial()">Limpiar</button>
            <ul id="historial-lista"></ul>
        </div>
    </main>

    <footer>
        <p>Solo para billetes de la <strong>Serie B</strong>.</p>
        <p>Otras series mantienen plena validez.</p>
        <p>By Cali</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
